[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[[redirects]]
  from = "/dynamic-sitemap.xml"
  to = "/.netlify/functions/dynamic-sitemap"
  status = 200

[[redirects]]
  from = "/auth/google/callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  REACT_APP_API_URL = "https://api.audiogretel.com" 