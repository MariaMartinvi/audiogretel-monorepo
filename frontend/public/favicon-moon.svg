<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <circle cx="32" cy="32" r="30" fill="#2d3a5f"/>
  
  <!-- MEDIA LUNA GORDITA -->
  <defs>
    <mask id="crescentMask">
      <circle cx="32" cy="32" r="23" fill="white"/>
      <circle cx="37" cy="31" r="21" fill="black"/>
    </mask>
  </defs>
  
  <g mask="url(#crescentMask)">
    <!-- Cuerpo de la luna -->
    <circle cx="32" cy="32" r="23" fill="#e8d8ff" stroke="#4a3a6a" stroke-width="2"/>
    
    <!-- Cráteres -->
    <circle cx="26" cy="25" r="3" fill="#d8c8f8" opacity="0.6"/>
    <circle cx="30" cy="37" r="2.5" fill="#c8b8e8" opacity="0.5"/>
    
    <!-- Ojos grandes -->
    <ellipse cx="26" cy="29" rx="3" ry="4" fill="#4a3a6a"/>
    <circle cx="26" cy="28" r="1.5" fill="#ffffff"/>
    
    <ellipse cx="36" cy="29" rx="3" ry="4" fill="#4a3a6a"/>
    <circle cx="36" cy="28" r="1.5" fill="#ffffff"/>
    
    <!-- Mejillas gorditas -->
    <ellipse cx="21" cy="33" rx="4" ry="2.5" fill="#ff8fab" opacity="0.6"/>
    <ellipse cx="41" cy="33" rx="4" ry="2.5" fill="#ff8fab" opacity="0.6"/>
    
    <!-- Sonrisa infantil -->
    <path d="M 24 35 Q 31 40 38 35" 
          fill="none" stroke="#4a3a6a" stroke-width="2.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Borde de la media luna -->
  <g mask="url(#crescentMask)">
    <circle cx="32" cy="32" r="23" fill="none" stroke="#4a3a6a" stroke-width="2"/>
  </g>
  
  <!-- ESTRELLA -->
  <polygon points="50,15 51,17 53,17 51.5,18.5 52,20.5 50,19 48,20.5 48.5,18.5 47,17 49,17" 
           fill="#ffd54f" stroke="#d4a574" stroke-width="0.8"/>
  
  <!-- Destellos -->
  <circle cx="17" cy="19" r="1.5" fill="#80deea"/>
  <circle cx="51" cy="46" r="1.5" fill="#ff8fab"/>
</svg>
